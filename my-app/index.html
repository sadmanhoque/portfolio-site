<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typing Animation</title>

<style>
    body {
        background: #111;
        color: #0f0;
        font-family: monospace;
        font-size: 2rem;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    #container {
        display: flex;
        align-items: center;
    }

    #cursor {
        width: 12px;
        height: 2rem;
        background: #0f0;
        margin-left: 3px;
        animation: blink 0.8s infinite;
    }

    @keyframes blink {
        0%   { opacity: 1; }
        50%  { opacity: 0; }
        100% { opacity: 1; }
    }
</style>
</head>

<body>

<div id="container">
    <div id="text"></div>
    <div id="cursor"></div>
</div>

<script>
    const text = "hello world";
    let index = 0;

    function typeNext() {
        if (index < text.length) {
            document.getElementById("text").textContent += text[index];
            index++;
            setTimeout(typeNext, 120); // typing speed
        }
    }

    typeNext();
</script>

</body>
</html>
